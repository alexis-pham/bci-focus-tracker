<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCI Focus Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e1e3a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #a0a0c0;
      text-transform: uppercase;
    }

    .header-subtitle {
      font-size: 9px;
      color: #505070;
      letter-spacing: 0.05em;
    }

    /* ── State card ── */
    .state-card {
      margin: 16px;
      padding: 16px;
      border-radius: 10px;
      background: #161628;
      border: 1px solid #1e1e3a;
      transition: border-color 0.4s ease, background 0.4s ease;
    }

    .state-card.focused {
      border-color: #00d4aa44;
      background: #0d1f1c;
    }

    .state-card.distracted {
      border-color: #ff6b6b44;
      background: #1f0d0d;
    }

    .state-card.artifact {
      border-color: #55557744;
    }

    .state-card.waiting {
      border-color: #444466;
    }

    /* ── Indicator dot ── */
    .indicator-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #444466;
      flex-shrink: 0;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .dot.focused {
      background: #00d4aa;
      box-shadow: 0 0 8px #00d4aa88;
      animation: pulse-green 2s infinite;
    }

    .dot.distracted {
      background: #ff6b6b;
      box-shadow: 0 0 8px #ff6b6b88;
      animation: pulse-red 1.2s infinite;
    }

    .dot.artifact {
      background: #888899;
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 8px #00d4aa88; }
      50%       { box-shadow: 0 0 14px #00d4aacc; }
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 8px #ff6b6b88; }
      50%       { box-shadow: 0 0 16px #ff6b6bcc; }
    }

    .state-label {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #c0c0e0;
      transition: color 0.3s ease;
    }

    .state-label.focused    { color: #00d4aa; }
    .state-label.distracted { color: #ff6b6b; }
    .state-label.artifact   { color: #888899; }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      background: #0f0f1e;
      border-radius: 6px;
      padding: 8px 10px;
      border: 1px solid #1e1e3a;
    }

    .stat-label {
      font-size: 9px;
      color: #505070;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 13px;
      color: #a0a0cc;
      font-weight: 600;
    }

    /* ── Progress bar ── */
    .progress-section {
      margin: 0 16px 14px;
    }

    .progress-label {
      font-size: 9px;
      color: #505070;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .progress-track {
      height: 4px;
      background: #1e1e3a;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* ── Connection status ── */
    .connection {
      margin: 0 16px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      color: #505070;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .conn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #555566;
      transition: background 0.3s;
    }

    .conn-dot.connected    { background: #00d4aa; }
    .conn-dot.disconnected { background: #ff6b6b; }

    /* ── Session message ── */
    .session-msg {
      margin: 0 16px 14px;
      font-size: 10px;
      color: #505070;
      line-height: 1.5;
      min-height: 16px;
    }

    .session-msg.distracted-msg {
      color: #ff9090;
    }

    .session-msg.focused-msg {
      color: #00a890;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🧠</div>
    <div>
      <div class="header-title">BCI Focus Monitor</div>
      <div class="header-subtitle">OpenBCI · 8ch EEG</div>
    </div>
  </div>

  <div id="stateCard" class="state-card waiting">
    <div class="indicator-row">
      <div id="dot" class="dot"></div>
      <div id="stateLabel" class="state-label">Waiting...</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Window</div>
        <div id="statWindow" class="stat-value">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Elapsed</div>
        <div id="statElapsed" class="stat-value">—</div>
      </div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-label">Replay progress</div>
    <div class="progress-track">
      <div id="progressFill" class="progress-fill"></div>
    </div>
  </div>

  <div class="connection">
    <div id="connDot" class="conn-dot"></div>
    <span id="connLabel">Connecting to replay server...</span>
  </div>

  <div id="sessionMsg" class="session-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
